tracing = true
max_homeservers = 24   # also the starting index for user keys
# user_storage_quota_mb = 512   # per-user storage cap on every homeserver (0 = unlimited)

# dashboard_addr = "127.0.0.1:6400"   # dashboard HTTP API address
# dashboard_enabled = true            # serve the dashboard HTTP API

[postgres]
url = "postgres://antfarm_user:antfarm_pass@localhost:5432/antfarm?pubky-test=true"

[[homeservers]]
label = "hs2"
seed = 1    # expands to [1; 32]

[[homeservers]]
label = "hs3"
seed = 2    # expands to [2; 32]

[simulator]
interval_secs = 20
# max_users_per_homeserver = 100   # cap users per homeserver (0 = unlimited); overflow becomes extra events
users_per_tick = [0, 5]
posts_per_tick = [0, 10]
tags_per_tick = [0, 10]
follows_per_tick = [0, 5]
